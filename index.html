<!DOCTYPE html>
<html lang="en">
<head>

<title>Minesweeper World</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#090912;color:#c8c8e0;font-family:'Consolas','Courier New',monospace;overflow:hidden;width:100vw;height:100vh;user-select:none}
#world-screen{position:fixed;inset:0}
#world-canvas{width:100%;height:100%;cursor:grab;display:block}
#world-canvas.dragging{cursor:grabbing}
#world-hud{position:fixed;top:12px;left:12px;background:rgba(8,14,34,.9);border:1px solid #1a2a4a;border-radius:6px;padding:8px 14px;font-size:12px;line-height:1.9;pointer-events:none;backdrop-filter:blur(4px)}
#world-hud .dim{color:#334}
#active-banner{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(20,50,130,.95);border:1.5px solid #3a6ad8;border-radius:8px;padding:10px 24px;font-size:14px;cursor:pointer;display:none;white-space:nowrap;transition:background .15s}
#active-banner:hover{background:rgba(40,70,170,.95)}
#game-screen{position:fixed;inset:0;display:none;flex-direction:column;background:#0e2640}
#game-header{display:flex;align-items:center;gap:12px;padding:8px 14px;background:#080e22;border-bottom:1px solid #1a2440;flex-shrink:0;min-height:50px}
.btn{background:#111c38;color:#8ab;border:1px solid #1e3050;padding:6px 14px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:13px;transition:background .12s}
.btn:hover{background:#1c2d54;color:#ace}
.btn.danger{color:#f88;border-color:#4a2020}
.btn.danger:hover{background:#2a1818;color:#faa}
.sbox{background:#0a1220;border:1px solid #1a2838;border-radius:4px;padding:3px 10px;font-size:15px;font-weight:bold;letter-spacing:1px;min-width:58px;text-align:center}
.slbl{font-size:10px;color:#445;margin-right:4px;letter-spacing:.5px}
#game-canvas-wrap{flex:1;overflow:auto;display:flex;align-items:center;justify-content:center;padding:10px}
#game-canvas{image-rendering:pixelated;cursor:crosshair}
#result-overlay{position:fixed;inset:0;background:rgba(0,0,8,.78);display:none;align-items:center;justify-content:center;z-index:50;backdrop-filter:blur(4px)}
#result-box{background:#080e22;border:2px solid #333;border-radius:12px;padding:36px 48px;text-align:center;min-width:320px}

#toast{position:fixed;top:58px;left:50%;transform:translateX(-50%);background:rgba(120,40,40,.92);border:1px solid #a44;border-radius:6px;padding:7px 20px;font-size:13px;pointer-events:none;opacity:0;transition:opacity .3s;z-index:100;white-space:nowrap}
#world-tooltip{position:fixed;display:none;background:rgba(8,14,34,.96);border:1px solid #2a4070;border-radius:6px;padding:8px 14px;font-size:12px;pointer-events:none;z-index:20;line-height:2;white-space:nowrap}

      Continue with Google

<!-- ── Leaderboard Panel ─────────────────────────────────────────────── -->

<!-- ── Feed (bottom-right win notifications) ────────────────────────── -->

<script>
'use strict';

// ── Difficulty Tiers ───────────────────────────────────────────────────────
const TIERS = [
  { id:'easy',   label:'EASY',   rows:10, cols:10, rate:0.10, weight:40,
    fill:'#2c2a24', border:'#d8c8a8', dot:'#ede0c4', text:'#c8b890',
    idle:'#f5ede0', won:'#bc8a20', lost:'#aaa090' },
  { id:'normal', label:'NORMAL', rows:10, cols:20, rate:0.13, weight:25,
    fill:'#1e2c22', border:'#88c8a0', dot:'#a8e0b8', text:'#78b888',
    idle:'#cef5dc', won:'#30a050', lost:'#809080' },
  { id:'medium', label:'MEDIUM', rows:20, cols:20, rate:0.15, weight:18,
    fill:'#1a2030', border:'#88b4e0', dot:'#a8cef5', text:'#7aaad8',
    idle:'#cce4fc', won:'#3070cc', lost:'#7c90a4' },
  { id:'hard',   label:'HARD',   rows:20, cols:30, rate:0.16, weight:10,
    fill:'#221830', border:'#b890e0', dot:'#d0aaf5', text:'#a880d0',
    idle:'#e8d0fc', won:'#7038c4', lost:'#8c80a4' },
  { id:'expert', label:'EXPERT', rows:30, cols:30, rate:0.17, weight: 5,
    fill:'#301e14', border:'#e0b070', dot:'#f5c888', text:'#d09050',
    idle:'#fce0b8', won:'#c07828', lost:'#a49078' },
  { id:'master', label:'MASTER', rows:30, cols:45, rate:0.19, weight: 2,
    fill:'#301414', border:'#e08080', dot:'#f5a8a8', text:'#d06060',
    idle:'#fcc8c8', won:'#b83030', lost:'#9c7878' },
];
const TIER_WSUM = TIERS.reduce((s,t)=>s+t.weight, 0);

// ── World Bounds ───────────────────────────────────────────────────────────
const WORLD_W = 20, WORLD_H = 16;

// Deterministic tier from grid coords (stable hash)
function gridTier(gx, gy) {
  let h = (Math.imul(gx, 1664525) ^ Math.imul(gy, 1013904223)) >>> 0;
  h = (Math.imul(h ^ (h >>> 16), 0x45d9f3b)) >>> 0;
  h = (Math.imul(h ^ (h >>> 16), 0x45d9f3b)) >>> 0;
  h = (h ^ (h >>> 16)) >>> 0;
  let r = h % TIER_WSUM;
  for (const t of TIERS) { if (r < t.weight) return t; r -= t.weight; }
  return TIERS[0];
}

// ── World constants ────────────────────────────────────────────────────────
const TILE = 70, TGAP = 3, TILE2 = TILE + TGAP;
const NCOL = ['','#0033cc','#007700','#cc0000','#00008b','#880000','#008888','#333333','#888888'];

// ── App State ──────────────────────────────────────────────────────────────
let screen = 'world';
let lastActiveKey = null;   // most recently visited active game
let viewKey = null;

// Initial camera: centered on world, zoom to show full 100×100
const cam = {
  x: 49.5,
  y: 49.5,
  zoom: 1
};

let pDown=false, pDragged=false, pStart={x:0,y:0}, pLast={x:0,y:0};

const store = new Map();
let hoverR=-1, hoverC=-1;
let timerTick=null, timerBase=0;

// Per-grid cell metrics, updated when opening a grid
let cs=22, cg=1, cs2=23;

// ── Grid Helpers ───────────────────────────────────────────────────────────
const gKey   = (gx,gy) => `${gx},${gy}`;
const gCoord = k => { const [x,y]=k.split(',').map(Number); return {gx:x,gy:y}; };

function ensureGrid(gx, gy) {
  const k = gKey(gx,gy);
  if (!store.has(k)) {
    const tier  = gridTier(gx, gy);
    const total = tier.rows * tier.cols;
    const mines = Math.round(total * tier.rate);
    store.set(k, {
      gx, gy, tier,
      rows: tier.rows, cols: tier.cols, total, mineCount: mines,
      status: 'idle',
      mines:    new Uint8Array(total),
      nums:     new Int8Array(total),
      revealed: new Uint8Array(total),
      flagged:  new Uint8Array(total),
      flagCount:0, revealedCount:0,
      firstClick:true, hitIdx:-1, elapsed:0,
    });
  }
  return store.get(k);
}

function calcCS(rows, cols) {
  const mh = window.innerHeight - 80;
  const mw = window.innerWidth  - 40;
  return Math.max(14, Math.min(36, Math.floor(Math.min(mh/(rows+2), mw/(cols+2)))));
}

// ── Minesweeper Logic ──────────────────────────────────────────────────────
function placeMines(g, sr, sc) {
  const {rows,cols,total,mineCount} = g;
  const safe = new Set();
  for (let dr=-1;dr<=1;dr++) for (let dc=-1;dc<=1;dc++) {
    const r=sr+dr,c=sc+dc;
    if (r>=0&&r<rows&&c>=0&&c<cols) safe.add(r*cols+c);
  }
  let placed=0;
  while (placed<mineCount) {
    const i=Math.floor(Math.random()*total);
    if (!g.mines[i]&&!safe.has(i)) { g.mines[i]=1; placed++; }
  }
  for (let r=0;r<rows;r++) for (let c=0;c<cols;c++) {
    const i=r*cols+c;
    if (g.mines[i]) { g.nums[i]=-1; continue; }
    let n=0;
    for (let dr=-1;dr<=1;dr++) for (let dc=-1;dc<=1;dc++) {
      if (!dr&&!dc) continue;
      const nr=r+dr,nc=c+dc;
      if (nr>=0&&nr<rows&&nc>=0&&nc<cols&&g.mines[nr*cols+nc]) n++;
    }
    g.nums[i]=n;
  }
}

function revealCell(g, r, c) {
  const {rows,cols} = g;
  const i=r*cols+c;
  if (g.revealed[i]||g.flagged[i]) return false;
  g.revealed[i]=1; g.revealedCount++;
  if (g.mines[i]) return true;
  if (g.nums[i]===0) {
    const q=[i]; let qi=0;
    while (qi<q.length) {
      const cur=q[qi++], cr=Math.floor(cur/cols), cc=cur%cols;
      for (let dr=-1;dr<=1;dr++) for (let dc=-1;dc<=1;dc++) {
        if (!dr&&!dc) continue;
        const nr=cr+dr,nc=cc+dc;
        if (nr<0||nr>=rows||nc<0||nc>=cols) continue;
        const ni=nr*cols+nc;
        if (g.revealed[ni]||g.flagged[ni]) continue;
        g.revealed[ni]=1; g.revealedCount++;
        if (g.nums[ni]===0) q.push(ni);
      }
    }
  }
  return false;
}

function isWon(g) { return g.revealedCount === g.total - g.mineCount; }

function chordCell(g, r, c) {
  const {rows,cols} = g;
  const i=r*cols+c;
  if (!g.revealed[i]||g.nums[i]<=0) return null;
  let flags=0; const cands=[];
  for (let dr=-1;dr<=1;dr++) for (let dc=-1;dc<=1;dc++) {
    if (!dr&&!dc) continue;
    const nr=r+dr,nc=c+dc;
    if (nr<0||nr>=rows||nc<0||nc>=cols) continue;
    const ni=nr*cols+nc;
    if (g.flagged[ni]) flags++;
    else if (!g.revealed[ni]) cands.push([nr,nc]);
  }
  if (flags!==g.nums[i]) return null;
  let hit=null;
  for (const [nr,nc] of cands) if (revealCell(g,nr,nc)&&!hit) hit=[nr,nc];
  return hit;
}

// ── World Canvas ───────────────────────────────────────────────────────────
const wCvs = document.getElementById('world-canvas');
const wCtx = wCvs.getContext('2d');

function clampCam() {
  const hw=wCvs.width/(2*cam.zoom*TILE2), hh=wCvs.height/(2*cam.zoom*TILE2);
  if (WORLD_W<=2*hw) cam.x=WORLD_W/2;
  else cam.x=Math.max(hw,Math.min(WORLD_W-hw,cam.x));
  if (WORLD_H<=2*hh) cam.y=WORLD_H/2;
  else cam.y=Math.max(hh,Math.min(WORLD_H-hh,cam.y));
}

function resizeWorld() { wCvs.width=innerWidth; wCvs.height=innerHeight; clampCam(); }

const t2s = (tx,ty) => [
  (tx-cam.x)*cam.zoom*TILE2 + wCvs.width/2,
  (ty-cam.y)*cam.zoom*TILE2 + wCvs.height/2
];
const s2t = (sx,sy) => [
  (sx-wCvs.width/2)  / (cam.zoom*TILE2) + cam.x,
  (sy-wCvs.height/2) / (cam.zoom*TILE2) + cam.y
];

function drawWorld() {
  const W=wCvs.width, H=wCvs.height, ctx=wCtx;
  ctx.fillStyle='#060610'; ctx.fillRect(0,0,W,H);

  const [tlx,tly]=s2t(0,0), [brx,bry]=s2t(W,H);
  const tx0=Math.max(0, Math.floor(tlx)-1);
  const tx1=Math.min(WORLD_W-1, Math.ceil(brx));
  const ty0=Math.max(0, Math.floor(tly)-1);
  const ty1=Math.min(WORLD_H-1, Math.ceil(bry));
  const tw=TILE*cam.zoom, th=tw;
  const pulse=0.5+0.5*Math.sin(Date.now()/400);

  for (let ty=ty0;ty<=ty1;ty++) for (let tx=tx0;tx<=tx1;tx++) {
    const [sx,sy]=t2s(tx,ty);
    const g    = store.get(gKey(tx,ty));
    const st   = g ? g.status : 'idle';
    const tier = g ? g.tier  : gridTier(tx,ty);

    let fill;
    if      (st==='won')    fill=tier.won;
    else if (st==='lost')   fill=tier.lost;
    else if (st==='active') fill=tier.dot;
    else                    fill=tier.idle;

    ctx.fillStyle=fill; ctx.fillRect(sx,sy,tw,th);

    if (st==='active') {
      ctx.fillStyle=`rgba(255,255,255,${0.08+0.14*pulse})`;
      ctx.fillRect(sx,sy,tw,th);
      const bw=Math.max(1,Math.round(tw*0.07));
      ctx.strokeStyle=`rgba(255,255,255,${0.35+0.4*pulse})`;
      ctx.lineWidth=bw;
      ctx.strokeRect(sx+bw/2,sy+bw/2,tw-bw,th-bw);
    }
  }

  // World border
  const [bsx,bsy]=t2s(0,0), [bex,bey]=t2s(WORLD_W,WORLD_H);
  ctx.strokeStyle='#2a4070'; ctx.lineWidth=2;
  ctx.strokeRect(bsx,bsy,bex-bsx,bey-bsy);
}

// parse "#rrggbb" → "r,g,b"
function hexToRgb(hex) {
  const n=parseInt(hex.slice(1),16);
  return `${(n>>16)&255},${(n>>8)&255},${n&255}`;
}

// ── Game Canvas ────────────────────────────────────────────────────────────
const gCvs = document.getElementById('game-canvas');
const gCtx = gCvs.getContext('2d');

function initGameCvs(g) {
  cs  = calcCS(g.rows, g.cols);
  cs2 = cs + cg;
  gCvs.width  = g.cols*cs2 + cg;
  gCvs.height = g.rows*cs2 + cg;
}

function drawGame() {
  const g=store.get(viewKey); if (!g) return;
  const {rows,cols}=g;
  const ctx=gCtx;
  ctx.fillStyle='#0e2640'; ctx.fillRect(0,0,gCvs.width,gCvs.height);
  const over=g.status==='lost'||g.status==='won';

  for (let r=0;r<rows;r++) for (let c=0;c<cols;c++) {
    const i=r*cols+c;
    const x=c*cs2+cg, y=r*cs2+cg;
    const rev=g.revealed[i], flag=g.flagged[i];
    const mine=g.mines[i], hit=i===g.hitIdx;
    const hov=r===hoverR&&c===hoverC&&!over&&g.status==='active'&&!rev;

    // Revealed: light sky-blue. Unrevealed: dark slate-blue (clearly distinct)
    let bg;
    if (rev)  bg=mine?(hit?'#c03030':'#c8d8e8'):'#b8d4ec';
    else      bg=flag?'#183a58':(hov?'#2a5a82':'#1e4868');
    ctx.fillStyle=bg; ctx.fillRect(x,y,cs,cs);

    if (!rev) {
      // 3D raised edge: bright top-left, dark bottom-right
      ctx.fillStyle=hov?'#3a6a98':'#2a5878';
      ctx.fillRect(x,y,cs,1); ctx.fillRect(x,y,1,cs);
      ctx.fillStyle='#0c2236';
      ctx.fillRect(x,y+cs-1,cs,1); ctx.fillRect(x+cs-1,y,1,cs);

      if (flag) {
        ctx.fillStyle='#e03020';
        ctx.beginPath();
        const fx=x+Math.round(cs*0.25), fy=y+Math.round(cs*0.12);
        const fw=Math.max(4,Math.round(cs*0.38)), fh=Math.max(3,Math.round(cs*0.32));
        ctx.moveTo(fx,fy); ctx.lineTo(fx+fw,fy+fh/2); ctx.lineTo(fx,fy+fh);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle='#ccc';
        ctx.fillRect(fx-Math.round(cs*0.07),fy,Math.max(1,Math.round(cs*0.07)),cs-Math.round(cs*0.15));
      } else if (mine&&over) {
        drawMineIcon(ctx,x+cs/2,y+cs/2,'#884040');
      }
    } else {
      if (mine) {
        drawMineIcon(ctx,x+cs/2,y+cs/2,hit?'#dd2222':'#993333');
      } else if (g.nums[i]>0) {
        ctx.fillStyle=NCOL[g.nums[i]];
        ctx.font=`bold ${Math.max(10,cs-3)}px Consolas,monospace`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(g.nums[i],x+cs/2,y+cs/2+1);
      }
    }
  }
}

function drawMineIcon(ctx,cx,cy,col) {
  const r=cs/2-2;
  ctx.fillStyle=col;
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle=col; ctx.lineWidth=1;
  for (let a=0;a<8;a++) {
    const ang=a/8*Math.PI*2;
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(ang)*(r-1),cy+Math.sin(ang)*(r-1));
    ctx.lineTo(cx+Math.cos(ang)*(r+2.5),cy+Math.sin(ang)*(r+2.5));
    ctx.stroke();
  }
  ctx.fillStyle='rgba(255,255,255,.25)';
  ctx.beginPath(); ctx.arc(cx-r*.28,cy-r*.28,r*.32,0,Math.PI*2); ctx.fill();
}

// ── Timer ──────────────────────────────────────────────────────────────────
function startTimer(g) {
  clearInterval(timerTick);
  timerBase=Date.now()-g.elapsed*1000;
  timerTick=setInterval(tickTimer,500); tickTimer();
}
function pauseTimer(g) {
  if (!timerTick) return;
  clearInterval(timerTick); timerTick=null;
  if (g) g.elapsed=Math.floor((Date.now()-timerBase)/1000);
}
function tickTimer() {
  const s=Math.floor((Date.now()-timerBase)/1000),m=Math.floor(s/60);
  document.getElementById('time-disp').textContent=`${m}:${(s%60).toString().padStart(2,'0')}`;
}
function showFinalTime(g) {
  const s=g.elapsed,m=Math.floor(s/60);
  document.getElementById('time-disp').textContent=`${m}:${(s%60).toString().padStart(2,'0')}`;
}

// ── Navigation ─────────────────────────────────────────────────────────────
function openGrid(gx, gy) {
  if (gx<0||gx>=WORLD_W||gy<0||gy>=WORLD_H) return;
  const k=gKey(gx,gy);

  // Pause timer of currently viewed game when switching
  if (viewKey && viewKey!==k) {
    const prev=store.get(viewKey);
    if (prev&&prev.status==='active'&&!prev.firstClick) pauseTimer(prev);
    else { clearInterval(timerTick); timerTick=null; }
  }

  const g=ensureGrid(gx,gy);

  if (g.status==='idle') g.status='active';
  if (g.status==='active') lastActiveKey=k;

  viewKey=k; screen='game';
  document.getElementById('world-screen').style.display='none';
  document.getElementById('game-screen').style.display='flex';
  document.getElementById('result-overlay').style.display='none';

  const t=g.tier;
  document.getElementById('hdr-grid').textContent=`Grid (${gx}, ${gy})`;
  document.getElementById('hdr-tier').textContent=`${t.label}  ${t.cols}×${t.rows}`;
  document.getElementById('hdr-tier').style.color=t.border;

  initGameCvs(g);
  document.getElementById('mine-disp').textContent=g.mineCount-g.flagCount;
  document.getElementById('restart-hdr-btn').style.display=g.status==='lost'?'':'none';

  if (g.status==='active') {
    if (g.firstClick) {
      document.getElementById('time-disp').textContent='0:00';
      document.getElementById('hdr-status').textContent='Click to begin';
    } else {
      startTimer(g);
      document.getElementById('hdr-status').textContent='';
    }
  } else {
    showFinalTime(g);
    document.getElementById('hdr-status').textContent=g.status==='won'?'✓ Completed':'✕ Game Over';
  }
  drawGame(); updateBanner();
}

function goWorld() {
  const g=viewKey?store.get(viewKey):null;
  if (g&&g.status==='active'&&!g.firstClick) pauseTimer(g);
  else { clearInterval(timerTick); timerTick=null; }
  screen='world';
  document.getElementById('world-screen').style.display='block';
  document.getElementById('game-screen').style.display='none';
  document.getElementById('result-overlay').style.display='none';
  updateBanner();
}

function resumeActive() {
  if (!lastActiveKey) return;
  const g=store.get(lastActiveKey);
  if (g&&g.status==='active') {
    const {gx,gy}=gCoord(lastActiveKey); openGrid(gx,gy); return;
  }
  // lastActiveKey is no longer active; find another active game
  for (const [k,gv] of store) {
    if (gv.status==='active') {
      lastActiveKey=k;
      const {gx,gy}=gCoord(k); openGrid(gx,gy); return;
    }
  }
  lastActiveKey=null; updateBanner();
}

function updateBanner() {
  const b=document.getElementById('active-banner');
  if (screen!=='world') { b.style.display='none'; return; }

  let key=lastActiveKey;
  if (key) {
    const g=store.get(key);
    if (!g||g.status!=='active') key=null;
  }
  if (!key) {
    for (const [k,g] of store) {
      if (g.status==='active') { key=k; lastActiveKey=k; break; }
    }
  }
  if (key) {
    const g=store.get(key);
    const {gx,gy}=gCoord(key);
    document.getElementById('banner-coord').textContent=`${gx}, ${gy}`;
    b.style.borderColor=g.tier.border;
    b.style.display='block';
  } else {
    b.style.display='none';
  }
}

// ── Win / Lose ─────────────────────────────────────────────────────────────
function handleLose(g, r, c) {
  g.hitIdx=r*g.cols+c; g.status='lost';
  pauseTimer(g);
  for (let i=0;i<g.total;i++) if (g.mines[i]) g.revealed[i]=1;
  drawGame();
  document.getElementById('hdr-status').textContent='✕ Game Over';
  document.getElementById('restart-hdr-btn').style.display='';
  updateBanner();
  setTimeout(()=>showResult(false,g),600);
}

function handleWin(g) {
  g.status='won'; pauseTimer(g);
  for (let i=0;i<g.total;i++) if (g.mines[i]&&!g.flagged[i]) { g.flagged[i]=1; g.flagCount++; }
  document.getElementById('mine-disp').textContent=0;
  drawGame();
  document.getElementById('hdr-status').textContent='✓ Completed!';
  document.getElementById('restart-hdr-btn').style.display='none';
  updateBanner();
  setTimeout(()=>showResult(true,g),400);
}

function showResult(won, g) {
  const box=document.getElementById('result-box');
  box.className=won?'win':'lose';
  document.getElementById('result-title').textContent=won?'YOU WIN!':'GAME OVER';
  const s=g.elapsed,m=Math.floor(s/60),ts=`${m}:${(s%60).toString().padStart(2,'0')}`;
  document.getElementById('result-info').innerHTML=won
    ?`<span style="color:${g.tier.border}">${g.tier.label}</span> Grid <strong>(${g.gx}, ${g.gy})</strong> cleared!<br>Time: <strong>${ts}</strong>`
    :`<span style="color:${g.tier.border}">${g.tier.label}</span> Grid <strong>(${g.gx}, ${g.gy})</strong><br>Time: <strong>${ts}</strong>`;
  document.getElementById('restart-overlay-btn').style.display=won?'none':'';
  document.getElementById('result-overlay').style.display='flex';
}

function dismissResult() {
  document.getElementById('result-overlay').style.display='none';
  goWorld();
}

function restartCurrentGrid() {
  if (!viewKey) return;
  const g=store.get(viewKey); if (!g) return;
  g.mines.fill(0); g.nums.fill(0); g.revealed.fill(0); g.flagged.fill(0);
  g.status='active'; g.flagCount=0; g.revealedCount=0;
  g.firstClick=true; g.hitIdx=-1; g.elapsed=0;
  clearInterval(timerTick); timerTick=null;
  const {gx,gy}=gCoord(viewKey);
  openGrid(gx,gy);
}

// ── Toast ──────────────────────────────────────────────────────────────────
let toastTO;
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.opacity='1';
  clearTimeout(toastTO);
  toastTO=setTimeout(()=>t.style.opacity='0',2600);
}

// ── World Input ────────────────────────────────────────────────────────────
wCvs.addEventListener('pointerdown', e=>{
  pDown=true; pDragged=false;
  pStart={x:e.clientX,y:e.clientY}; pLast={x:e.clientX,y:e.clientY};
  wCvs.setPointerCapture(e.pointerId); wCvs.classList.add('dragging');
});
wCvs.addEventListener('pointermove', e=>{
  if (!pDown) return;
  if (Math.abs(e.clientX-pStart.x)+Math.abs(e.clientY-pStart.y)>5) pDragged=true;
  cam.x -= (e.clientX-pLast.x)/(cam.zoom*TILE2);
  cam.y -= (e.clientY-pLast.y)/(cam.zoom*TILE2);
  clampCam();
  pLast={x:e.clientX,y:e.clientY};
});
wCvs.addEventListener('pointerup', e=>{
  pDown=false; wCvs.classList.remove('dragging');
  if (!pDragged) {
    const [tx,ty]=s2t(e.clientX,e.clientY);
    const gx=Math.floor(tx), gy=Math.floor(ty);
    if (gx>=0&&gx<WORLD_W&&gy>=0&&gy<WORLD_H) openGrid(gx,gy);
  }
});
wCvs.addEventListener('wheel', e=>{
  e.preventDefault();
  const [wx,wy]=s2t(e.clientX,e.clientY);
  cam.zoom=Math.max(0.05,Math.min(4,cam.zoom*(e.deltaY<0?1.13:1/1.13)));
  const [nx,ny]=s2t(e.clientX,e.clientY);
  cam.x+=wx-nx; cam.y+=wy-ny;
  clampCam();
  document.getElementById('hud-zoom').textContent=`Zoom: ${cam.zoom.toFixed(2)}×`;
},{passive:false});

// ── World Hover Tooltip ────────────────────────────────────────────────────
let wHoverTx=-1, wHoverTy=-1, hoverDelayTO=null, ttMx=0, ttMy=0;

function showTT(gx,gy) {
  const g=store.get(gKey(gx,gy));
  const tier=g?g.tier:gridTier(gx,gy);
  document.getElementById('tt-label').style.color=tier.dot;
  document.getElementById('tt-label').textContent=tier.label;
  document.getElementById('tt-size').textContent=`${tier.cols}×${tier.rows}  ·  ${Math.round(tier.rate*100)}% mines`;
  const el=document.getElementById('world-tooltip'), m=14;
  el.style.left=(ttMx+m)+'px'; el.style.top=(ttMy+m)+'px'; el.style.display='block';
  const r=el.getBoundingClientRect();
  if(r.right>innerWidth)  el.style.left=(ttMx-r.width-m)+'px';
  if(r.bottom>innerHeight) el.style.top=(ttMy-r.height-m)+'px';
}
function hideTT(){ document.getElementById('world-tooltip').style.display='none'; }

wCvs.addEventListener('mousemove', e=>{
  ttMx=e.clientX; ttMy=e.clientY;
  if(pDown){ hideTT(); clearTimeout(hoverDelayTO); return; }
  const[tx,ty]=s2t(e.clientX,e.clientY);
  const gx=Math.floor(tx), gy=Math.floor(ty);
  if(gx!==wHoverTx||gy!==wHoverTy){
    wHoverTx=gx; wHoverTy=gy;
    clearTimeout(hoverDelayTO); hideTT();
    if(gx>=0&&gx<WORLD_W&&gy>=0&&gy<WORLD_H)
      hoverDelayTO=setTimeout(()=>showTT(gx,gy),500);
  }
});
wCvs.addEventListener('mouseleave',()=>{
  wHoverTx=-1; wHoverTy=-1; clearTimeout(hoverDelayTO); hideTT();
});

// ── Game Input ─────────────────────────────────────────────────────────────
function gamePosPx(e) {
  const rect=gCvs.getBoundingClientRect();
  const px=(e.clientX-rect.left)*(gCvs.width/rect.width);
  const py=(e.clientY-rect.top) *(gCvs.height/rect.height);
  return [Math.floor((px-cg)/cs2), Math.floor((py-cg)/cs2)]; // [c,r]
}

gCvs.addEventListener('click', e=>{
  const g=store.get(viewKey); if (!g||g.status!=='active') return;
  const [c,r]=gamePosPx(e);
  if (r<0||r>=g.rows||c<0||c>=g.cols) return;
  const i=r*g.cols+c;
  if (g.firstClick) {
    placeMines(g,r,c); g.firstClick=false;
    document.getElementById('hdr-status').textContent='';
    startTimer(g);
  }
  if (g.revealed[i]&&g.nums[i]>0) {
    const hit=chordCell(g,r,c);
    if (hit) handleLose(g,hit[0],hit[1]);
    else if (isWon(g)) handleWin(g);
    else drawGame();
    return;
  }
  if (!g.revealed[i]&&!g.flagged[i]) {
    if (revealCell(g,r,c)) handleLose(g,r,c);
    else if (isWon(g)) handleWin(g);
    else drawGame();
  }
});

gCvs.addEventListener('contextmenu', e=>{
  e.preventDefault();
  const g=store.get(viewKey); if (!g||g.status!=='active'||g.firstClick) return;
  const [c,r]=gamePosPx(e);
  if (r<0||r>=g.rows||c<0||c>=g.cols) return;
  const i=r*g.cols+c;
  if (g.revealed[i]) return;
  if (g.flagged[i]) { g.flagged[i]=0; g.flagCount--; }
  else              { g.flagged[i]=1; g.flagCount++; }
  document.getElementById('mine-disp').textContent=g.mineCount-g.flagCount;
  drawGame();
});

gCvs.addEventListener('mousemove', e=>{
  const g=store.get(viewKey); if (!g||g.status!=='active') return;
  const [c,r]=gamePosPx(e);
  const nr=r>=0&&r<g.rows?r:-1, nc=c>=0&&c<g.cols?c:-1;
  if (nr!==hoverR||nc!==hoverC) { hoverR=nr; hoverC=nc; drawGame(); }
});
gCvs.addEventListener('mouseleave',()=>{ hoverR=hoverC=-1; drawGame(); });

// ── Legend ─────────────────────────────────────────────────────────────────
function buildLegend() {
  const el=document.getElementById('hud-legend');
  TIERS.forEach(t=>{
    const s=document.createElement('span');
    s.style.cssText=`display:flex;align-items:center;gap:4px;font-size:11px;white-space:nowrap`;
    s.innerHTML=`<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${t.dot}"></span>`+
                `<span style="color:${t.text}">${t.label}</span>`;
    el.appendChild(s);
  });
}

// ── Main Loop ──────────────────────────────────────────────────────────────
function loop() {
  if (screen==='world') {
    drawWorld();
    const [cx,cy]=s2t(wCvs.width/2,wCvs.height/2);
    document.getElementById('hud-pos').textContent=`Center: (${Math.floor(cx)}, ${Math.floor(cy)})`;
    const activeCount=[...store.values()].filter(g=>g.status==='active').length;
    document.getElementById('hud-hint').textContent=activeCount>0
      ?`${activeCount} game${activeCount>1?'s':''} in progress — click to switch`
      :'Click any grid to start a game';

  }
  requestAnimationFrame(loop);
}

resizeWorld();
buildLegend();

// ═══════════════════════════════════════════════════════════════════════════
// ── API & Auth Module ──────────────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════════════
const API_BASE = '/api';

// ── Token storage ──────────────────────────────────────────────────────────
const Auth = {
  _access: null,
  _refresh: localStorage.getItem('msw_refresh'),
  username: localStorage.getItem('msw_username'),
  userId:   localStorage.getItem('msw_userId'),
  role:     localStorage.getItem('msw_role') ?? 'user',

  isLoggedIn() { return !!this._refresh; },
  isAdmin()    { return this.role === 'admin'; },

  setTokens({ accessToken, refreshToken, username, userId, role = 'user' }) {
    this._access  = accessToken;
    this._refresh = refreshToken;
    this.username = username;
    this.userId   = userId;
    this.role     = role;
    localStorage.setItem('msw_refresh',  refreshToken);
    localStorage.setItem('msw_username', username);
    localStorage.setItem('msw_userId',   userId);
    localStorage.setItem('msw_role',     role);
    updateAuthHUD();
  },

  clear() {
    this._access = this._refresh = this.username = this.userId = null;
    this.role = 'user';
    localStorage.removeItem('msw_refresh');
    localStorage.removeItem('msw_username');
    localStorage.removeItem('msw_userId');
    localStorage.removeItem('msw_role');
    updateAuthHUD();
  },

  async getAccess() {
    if (this._access) {
      // Check expiry (JWT payload middle segment)
      try {
        const { exp } = JSON.parse(atob(this._access.split('.')[1]));
        if (Date.now() / 1000 < exp - 30) return this._access;
      } catch {}
    }
    if (!this._refresh) return null;
    try {
      const res = await fetch(`${API_BASE}/auth/refresh`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ refreshToken: this._refresh }),
      });
      if (!res.ok) { this.clear(); return null; }
      const { accessToken } = await res.json();
      this._access = accessToken;
      return accessToken;
    } catch { return null; }
  },
};

// ── Generic authenticated fetch ────────────────────────────────────────────
async function apiFetch(path, opts = {}) {
  const token = await Auth.getAccess();
  const headers = { 'Content-Type': 'application/json', ...(opts.headers ?? {}) };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const res = await fetch(`${API_BASE}${path}`, { ...opts, headers });
  if (!res.ok) throw Object.assign(new Error(res.statusText), { status: res.status });
  return res.json();
}

// ── Serialise/deserialise grid state ──────────────────────────────────────
function gridToPayload(g) {
  const toB64 = arr => arr ? btoa(String.fromCharCode(...arr)) : null;
  return {
    status:        g.status,
    mines:         toB64(g.mines),
    revealed:      toB64(g.revealed),
    flagged:       toB64(g.flagged),
    flagCount:     g.flagCount,
    revealedCount: g.revealedCount,
    firstClick:    g.firstClick,
    hitIdx:        g.hitIdx,
    elapsed:       g.elapsed,
  };
}

function payloadToGrid(p, existingG) {
  const fromB64 = (s, Ctor) => {
    if (!s) return new Ctor(existingG.total);
    const bin = atob(s);
    const arr = new Ctor(bin.length);
    for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
    return arr;
  };
  existingG.status        = p.status;
  existingG.mines         = fromB64(p.mines,    Uint8Array);
  existingG.revealed      = fromB64(p.revealed,  Uint8Array);
  existingG.flagged       = fromB64(p.flagged,   Uint8Array);
  existingG.flagCount     = p.flagCount     ?? 0;
  existingG.revealedCount = p.revealedCount ?? 0;
  existingG.firstClick    = p.firstClick    ?? true;
  existingG.hitIdx        = p.hitIdx        ?? -1;
  existingG.elapsed       = p.elapsed       ?? 0;
  // Recompute nums from mines (needed for display)
  if (!existingG.firstClick) _recomputeNums(existingG);
}

function _recomputeNums(g) {
  const { rows, cols } = g;
  for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
    const i = r * cols + c;
    if (g.mines[i]) { g.nums[i] = -1; continue; }
    let n = 0;
    for (let dr=-1;dr<=1;dr++) for (let dc=-1;dc<=1;dc++) {
      if (!dr&&!dc) continue;
      const nr=r+dr,nc=c+dc;
      if (nr>=0&&nr<rows&&nc>=0&&nc<cols&&g.mines[nr*cols+nc]) n++;
    }
    g.nums[i] = n;
  }
}

// ── Progress sync ──────────────────────────────────────────────────────────
async function syncLoadAll() {
  if (!Auth.isLoggedIn()) return;
  try {
    const { grids: rows } = await apiFetch('/progress');
    for (const p of rows) {
      const g = ensureGrid(p.gx, p.gy);
      payloadToGrid(p, g);
    }
  } catch (e) {
    console.warn('[sync] load failed:', e.message);
  }
}

async function syncSave(gx, gy) {
  if (!Auth.isLoggedIn()) return;
  const g = store.get(gKey(gx, gy));
  if (!g) return;
  try {
    await apiFetch(`/progress/${gx}/${gy}`, {
      method: 'PUT',
      body: JSON.stringify(gridToPayload(g)),
    });
  } catch (e) {
    console.warn('[sync] save failed:', e.message);
  }
}

async function syncDelete(gx, gy) {
  if (!Auth.isLoggedIn()) return;
  try {
    await apiFetch(`/progress/${gx}/${gy}`, { method: 'DELETE' });
  } catch (e) {
    console.warn('[sync] delete failed:', e.message);
  }
}

// ── Real-time client (WS with polling fallback) ────────────────────────────
// Tries WebSocket first; if the server doesn't expose /ws (e.g. Vercel),
// falls back to polling /api/world/presence every 15 s.
const wsClient = (() => {
  let ws = null, reconnectTO = null, pollTO = null, currentGrid = null;
  let usingPolling = false;

  function updatePresenceUI(count) {
    document.getElementById('hud-online').textContent =
      `${count} player${count !== 1 ? 's' : ''} online`;
  }

  function startPolling() {
    usingPolling = true;
    async function poll() {
      try {
        const data = await apiFetch('/world/presence').catch(() => ({ count: 0 }));
        updatePresenceUI(data.count ?? 0);
      } catch {}
      pollTO = setTimeout(poll, 15000);
    }
    poll();
  }

  function connect() {
    if (usingPolling) return;
    if (ws && ws.readyState <= 1) return;
    clearTimeout(reconnectTO);

    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    try {
      ws = new WebSocket(`${proto}://${location.host}/ws`);
    } catch {
      startPolling(); return;
    }

    // If WS fails to open within 3 s, assume server has no WS and switch to polling
    const wsTimeout = setTimeout(() => {
      if (!ws || ws.readyState !== 1) { ws?.close(); startPolling(); }
    }, 3000);

    ws.onopen = () => {
      clearTimeout(wsTimeout);
      if (currentGrid) ws.send(JSON.stringify({ type: 'enter_grid', ...currentGrid }));
    };

    ws.onmessage = ({ data }) => {
      let msg; try { msg = JSON.parse(data); } catch { return; }
      if (msg.type === 'presence') updatePresenceUI(msg.count);
      if (msg.type === 'grid_won') {
        addFeedItem(`${msg.username} cleared (${msg.gx},${msg.gy})!`);
        refreshLeaderboardIfOpen();
      }
    };

    ws.onerror = () => { clearTimeout(wsTimeout); };

    ws.onclose = () => {
      clearTimeout(wsTimeout);
      if (!usingPolling) reconnectTO = setTimeout(connect, 5000);
    };
  }

  function enterGrid(gx, gy) {
    currentGrid = { gx, gy };
    if (!usingPolling && ws?.readyState === 1) ws.send(JSON.stringify({ type: 'enter_grid', gx, gy }));
  }
  function leaveGrid() {
    currentGrid = null;
    if (!usingPolling && ws?.readyState === 1) ws.send(JSON.stringify({ type: 'leave_grid' }));
  }

  return { connect, enterGrid, leaveGrid };
})();

function addFeedItem(text) {

  try {
    const { leaderboard: rows } = await apiFetch('/leaderboard');

    el.innerHTML = rows.map((r, i) =>
      `<div class="lb-row">

    ).join('') || '<div style="color:#334;font-size:11px;padding:8px 0">No completions yet</div>';
  } catch {}
}

  if (document.getElementById('leaderboard-panel').classList.contains('open')) refreshLeaderboard();
}

// ── Auth UI ────────────────────────────────────────────────────────────────
let authMode = 'login'; // 'login' | 'register'

function showAuthOrProfile() {
  if (Auth.isLoggedIn()) {
    if (confirm(`Logged in as ${Auth.username}\n\nLog out?`)) {
      apiFetch('/auth/logout', { method: 'POST', body: JSON.stringify({ refreshToken: Auth._refresh }) })
        .catch(() => {});
      Auth.clear();
    }
  } else {
    showAuth('login');
  }
}

function showAuth(mode = 'login') {
  authMode = mode;
  document.getElementById('auth-title').textContent = mode === 'login' ? 'Login' : 'Register';
  document.getElementById('auth-submit').textContent = mode === 'login' ? 'Login' : 'Register';
  document.getElementById('auth-toggle').innerHTML =
    mode === 'login'
      ? 'No account? <a onclick="toggleAuthMode()">Register</a>'
      : 'Have an account? <a onclick="toggleAuthMode()">Login</a>';
  document.getElementById('auth-email-wrap').style.display = mode === 'register' ? '' : 'none';
  document.getElementById('auth-err').textContent = '';
  document.getElementById('auth-overlay').style.display = 'flex';
  setTimeout(() => document.getElementById('auth-username').focus(), 80);
}

function hideAuth() {
  document.getElementById('auth-overlay').style.display = 'none';
}

function toggleAuthMode() {
  showAuth(authMode === 'login' ? 'register' : 'login');
}

document.getElementById('auth-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitAuth();
});

async function submitAuth() {
  const username = document.getElementById('auth-username').value.trim();
  const password = document.getElementById('auth-password').value;
  const email    = document.getElementById('auth-email').value.trim() || undefined;
  const errEl    = document.getElementById('auth-err');

  if (!username || !password) { errEl.textContent = 'Please fill in all fields'; return; }
  document.getElementById('auth-submit').disabled = true;

  try {
    const payload = { username, password, ...(authMode === 'register' && email ? { email } : {}) };
    const data = await apiFetch(`/auth/${authMode}`, {
      method: 'POST',
      body: JSON.stringify(payload),
    });
    Auth.setTokens(data);
    hideAuth();
    await syncLoadAll();      // pull server progress into local store
    wsClient.connect();
  } catch (e) {
    errEl.textContent = e.status === 409 ? 'Username already taken'
      : e.status === 401 ? 'Invalid username or password'
      : 'Server error, please try again';
  } finally {
    document.getElementById('auth-submit').disabled = false;
  }
}

function updateAuthHUD() {
  const el = document.getElementById('login-btn');
  if (Auth.isLoggedIn()) {
    el.textContent = `⬡ ${Auth.username}  (logout)`;
  } else {
    el.textContent = '⬡ Login / Register';
  }
  const adminLink = document.getElementById('admin-link');
  if (adminLink) adminLink.style.display = Auth.isAdmin() ? '' : 'none';
}

// ── Google OAuth ───────────────────────────────────────────────────────────
let _supabase = null;
async function getSupabase() {
  if (_supabase) return _supabase;
  const { supabaseUrl, supabaseAnonKey } = await fetch('/api/config').then(r => r.json());
  // detectSessionInUrl:false prevents Supabase auto-exchanging the PKCE code,
  // which would race with our manual exchangeCodeForSession call below.
  _supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey, {
    auth: { detectSessionInUrl: false },
  });
  return _supabase;
}

async function googleSignIn() {
  try {
    document.getElementById('auth-err').textContent = '';
    const sb = await getSupabase();
    await sb.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin },
    });
  } catch (e) {
    document.getElementById('auth-err').textContent = 'Google sign-in failed';
  }
}

async function handleOAuthCallback() {
  // Implicit flow: Supabase puts access_token in the URL hash fragment
  // PKCE flow: Supabase puts code in the query string (fallback)
  const hash   = new URLSearchParams(window.location.hash.slice(1));
  const query  = new URLSearchParams(window.location.search);
  const accessToken = hash.get('access_token');
  const code        = query.get('code');
  if (!accessToken && !code) return;

  // Clean URL immediately — prevents re-running on refresh
  history.replaceState(null, '', window.location.pathname);

  try {
    let token = accessToken;

    if (!token) {
      // PKCE fallback: exchange the code for a session
      const sb = await getSupabase();
      const { data: { session }, error } = await sb.auth.exchangeCodeForSession(code);
      if (error) { console.error('[oauth] code exchange error:', error); showToast('Google login failed: ' + error.message); return; }
      if (!session) { console.error('[oauth] no session'); showToast('Google login failed: no session'); return; }
      token = session.access_token;
    }

    console.log('[oauth] got token, calling /auth/google...');
    const data = await apiFetch('/auth/google', {
      method: 'POST',
      body: JSON.stringify({ supabaseToken: token }),
    });
    console.log('[oauth] logged in as:', data.username);
    Auth.setTokens(data);
    await syncLoadAll();
    wsClient.connect();
  } catch (e) {
    console.error('[oauth] callback error:', e);
    showToast('Google login error: ' + e.message);
  }
}

// ── Boot ───────────────────────────────────────────────────────────────────
updateAuthHUD();
if (Auth.isLoggedIn()) {
  syncLoadAll();
  wsClient.connect();
} else {
  wsClient.connect();
  handleOAuthCallback(); // handle Google redirect if present
}
